name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # या आपके मुख्य ब्रांच का नाम

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # यह Vite का डिफ़ॉल्ट आउटपुट फोल्डर है
          branch: gh-pages # यह उस ब्रांच का नाम है जहाँ बिल्ड फाइलें जाएँगी
